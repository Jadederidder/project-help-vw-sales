name: Daily VW/Audi Cancellations Sync

on:
  schedule:
    # 04:00 SAST = 02:00 UTC. Early enough that the summary email lands
    # in JD's inbox before her 04:30 SAST start. Followed at +5 min by
    # sync_rejections, +10 min by cancel_casi_revio.
    - cron: "0 2 * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — parse only, no sheet write, no state commit, email jd only"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      diagnostic:
        description: "Diagnostic — list matching emails and exit; no parse / email / write"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  actions:  write

jobs:
  sync:
    name: Sync cancellations from email
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run cancellations sync
        env:
          CANCEL_EMAIL_ADDRESS:      ${{ secrets.CANCEL_EMAIL_ADDRESS }}
          CANCEL_EMAIL_APP_PASSWORD: ${{ secrets.CANCEL_EMAIL_APP_PASSWORD }}
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:           ${{ secrets.EMAIL_RECIPIENT }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          DRY_RUN:                   ${{ github.event.inputs.dry_run || 'false' }}
          DIAGNOSTIC:                ${{ github.event.inputs.diagnostic || 'false' }}
        run: python scripts/sync_cancellations.py

      - name: Export summary data to JSON
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.diagnostic != 'true' }}
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:           ${{ secrets.EMAIL_RECIPIENT }}
        run: python scripts/export_summary.py

      - name: Commit processed-emails state and dashboard data
        id: commit
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.diagnostic != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/processed_emails.json docs/data/summary.json
          if git diff --staged --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update cancellation state and refresh dashboard"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy_pages.yml --ref main
