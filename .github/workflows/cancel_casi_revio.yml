name: VW Casi Cancellations

on:
  schedule:
    # 04:10 SAST = 02:10 UTC. 10 min after sync_cancellations (02:00 UTC)
    # so any newly-appended CANCELLATIONS rows are picked up here. Email
    # lands well before JD's 04:30 SAST start.
    - cron: "10 2 * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — no Casi calls, no sheet writes, no live email"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  cancel:
    name: Cancel Wesbank VW/Audi clients in Casi
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run cancel script
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          CASI_CLIENT_SECRET:        ${{ secrets.CASI_CLIENT_SECRET }}
          CASI_USERNAME:             ${{ secrets.CASI_USERNAME }}
          CASI_PASSWORD:             ${{ secrets.CASI_PASSWORD }}
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:           "jd@projecthelp.io"
          DRY_RUN:                   ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/cancel_casi_revio.py

      - name: Export summary data to JSON
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python scripts/export_summary.py

      - name: Commit dashboard data to repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/summary.json
          git diff --staged --quiet || git commit -m "chore: refresh dashboard data after Casi cancellations"
          git push

      - name: Notify on failure
        if: failure()
        run: echo "::error::cancel_casi_revio FAILED — check the logs above."
