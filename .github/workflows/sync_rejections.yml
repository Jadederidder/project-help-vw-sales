name: Daily VW/Audi Rejections Sync

on:
  schedule:
    # 04:05 SAST = 02:05 UTC. 5 min after sync_cancellations (02:00 UTC),
    # 5 min before cancel_casi_revio (02:10 UTC). Email lands well before
    # JD's 04:30 SAST start.
    - cron: "5 2 * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — parse only, no sheet write, email jd only"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions:  write

jobs:
  sync:
    name: Sync rejections from email
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rejections sync
        env:
          CANCEL_EMAIL_ADDRESS:      ${{ secrets.CANCEL_EMAIL_ADDRESS }}
          CANCEL_EMAIL_APP_PASSWORD: ${{ secrets.CANCEL_EMAIL_APP_PASSWORD }}
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:           ${{ secrets.EMAIL_RECIPIENT }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          DRY_RUN:                   ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/sync_rejections.py

      - name: Export summary data to JSON
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:           ${{ secrets.EMAIL_RECIPIENT }}
        run: python scripts/export_summary.py

      - name: Commit dashboard data to repo
        id: commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/summary.json
          if git diff --staged --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh dashboard data after rejections sync"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy_pages.yml --ref main
