name: Sync VW Audi Sales to Google Sheets

on:
  schedule:
    - cron: "13 15 * * 1"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-sales:
    name: Sync Sales to Google Sheets
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync sales to Google Sheets
        env:
          SFTP_PASSWORD:              ${{ secrets.SFTP_PASSWORD }}
          GOOGLE_SHEETS_CREDENTIALS:  ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          EMAIL_SENDER:               ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:             ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:            ${{ secrets.EMAIL_RECIPIENT }}
        run: python scripts/sync_sales_to_sheets.py

      - name: Export account drilldown data to JSON
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python scripts/export_accounts.py

      - name: Export summary data to JSON
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python scripts/export_summary.py

      - name: Commit dashboard data to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/accounts.json docs/data/summary.json
          git diff --staged --quiet || git commit -m "chore: refresh dashboard data"
          git push
