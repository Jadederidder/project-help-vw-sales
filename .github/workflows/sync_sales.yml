name: Sync VW Audi Sales to Google Sheets

on:
  schedule:
    - cron: "13 15 * * 1"

  workflow_dispatch:
    inputs:
      skip_sales_sync:
        description: "Skip sync_sales_to_sheets step (no off-cycle team email)"
        type: boolean
        default: false
      skip_pending_recheck:
        description: "Skip the convert_account_expiry --pending-recheck-only step"
        type: boolean
        default: false

permissions:
  contents: write
  actions:  write

jobs:
  sync-sales:
    name: Sync Sales to Google Sheets
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync sales to Google Sheets
        if: ${{ !inputs.skip_sales_sync }}
        env:
          SFTP_PASSWORD:              ${{ secrets.SFTP_PASSWORD }}
          GOOGLE_SHEETS_CREDENTIALS:  ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          EMAIL_SENDER:               ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:             ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:            ${{ secrets.EMAIL_RECIPIENT }}
        run: python scripts/sync_sales_to_sheets.py

      - name: Export account drilldown data to JSON
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          # Used only on duplicate-tab collision to email JD a failure alert.
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
        run: python scripts/export_accounts.py

      - name: Export summary data to JSON
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:           ${{ secrets.EMAIL_RECIPIENT }}
        run: python scripts/export_summary.py

      - name: Commit dashboard data to repo
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/accounts.json docs/data/summary.json
          if git diff --staged --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh dashboard data"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy_pages.yml --ref main

      - name: Re-check PENDING_CONVERSIONS (weekly maintenance)
        if: ${{ !inputs.skip_pending_recheck }}
        env:
          REVIO_API_KEY:                ${{ secrets.REVIO_API_KEY }}
          REVIO_BRAND_ID:               ${{ secrets.REVIO_BRAND_ID }}
          REVIO_TEMPLATE_VW_SINGLE_ID:  ${{ secrets.REVIO_TEMPLATE_VW_SINGLE_ID }}
          REVIO_TEMPLATE_VW_FAMILY_ID:  ${{ secrets.REVIO_TEMPLATE_VW_FAMILY_ID }}
          GOOGLE_SHEETS_CREDENTIALS:    ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          EMAIL_SENDER:                 ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:               ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:              ${{ secrets.EMAIL_RECIPIENT }}
        run: python scripts/convert_account_expiry.py --pending-recheck-only
