name: Diagnostic — VW Pending × Active Overlap (one-off)

# Manual-trigger only. Read-only against Revio. Always emails JD only.
# Answers the single question: of the 118 VW pending, how many already
# have an active sub elsewhere? Designed to be deletable after the
# question is answered.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    name: Cross-ref VW pending against active phones
    runs-on: ubuntu-latest
    # Pessimistic: ~118 VW pending + ~2,812 active = ~2,930 unique
    # Client GETs after dedupe, plus the all-templates BTC listing
    # pass. The full dump took ~50 min; this should be similar.
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run overlap check
        env:
          REVIO_API_KEY:   ${{ secrets.REVIO_API_KEY }}
          REVIO_BRAND_ID:  ${{ secrets.REVIO_BRAND_ID }}
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
        run: python scripts/check_vw_pending_active_overlap.py
