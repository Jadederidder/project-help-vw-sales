name: Monthly Invoice Sync

on:
  schedule:
    - cron: "0 4 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true = analyse only, no changes)"
        required: false
        default: "false"
      target_month:
        description: "Override month to process (YYYY-MM, e.g. 2026-04). Leave blank to use last month."
        required: false
        default: ""

permissions:
  contents: write
  actions:  write

jobs:
  sync-invoice:
    name: Sync Monthly Invoice Data
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run monthly invoice sync
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:           ${{ secrets.EMAIL_RECIPIENT }}
          DRY_RUN:                   ${{ github.event.inputs.dry_run || 'false' }}
          TARGET_MONTH:              ${{ github.event.inputs.target_month }}
        run: python scripts/sync_monthly_invoice.py

      - name: Export summary data to JSON
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:           ${{ secrets.EMAIL_RECIPIENT }}
        run: python scripts/export_summary.py

      - name: Commit dashboard data to repo
        id: commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/summary.json
          if git diff --staged --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh dashboard data"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy_pages.yml --ref main
