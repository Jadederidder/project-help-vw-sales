name: Revio — Silence Existing Subscribers (one-off)

# Manual-trigger only. PATCHes every BillingTemplateClient to set the three
# customer-facing comm flags to false. Never run on a cron — this is a
# one-off backfill mirroring the new add_subscriber default.
# DRY_RUN defaults to "true" so a stray click previews instead of patching.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — list subscribers that would be patched, no API writes, email jd only"
        required: false
        default: "true"
        type: string

permissions:
  contents: read

jobs:
  silence:
    name: Silence existing Revio subscribers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run silence backfill
        env:
          REVIO_API_KEY:    ${{ secrets.REVIO_API_KEY }}
          REVIO_BRAND_ID:   ${{ secrets.REVIO_BRAND_ID }}
          EMAIL_SENDER:     ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:  ${{ secrets.EMAIL_RECIPIENT }}
          DRY_RUN:          ${{ github.event.inputs.dry_run }}
        run: python scripts/silence_existing_revio_subscribers.py
