name: Revio — Non-Active Subscriber Dump (one-off)

# Manual-trigger only. Walks every subscription billing template,
# pulls the full Client record for every BTC in {paused, pending,
# inactive}, joins them into a multi-sheet Excel workbook attached
# to a summary email. Read-only against Revio (GETs only) — no
# PATCH or POST. Never run on a cron — JD fires this on demand.
# DRY_RUN defaults to "true" so a stray click previews to JD only.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — email JD only (still attaches the Excel so JD can verify format before broader distribution)"
        required: false
        default: "true"
        type: string

permissions:
  contents: read

jobs:
  dump:
    name: Dump non-active Revio subscribers
    runs-on: ubuntu-latest
    # 5,259 non-active BTCs + their underlying Client GETs + the
    # active-side cross-ref pass adds up to ~7K GETs after dedup.
    # 60min matches silence_existing_revio_subscribers.yml so the
    # ceiling is consistent across the one-off Revio family.
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run non-active dump
        env:
          REVIO_API_KEY:              ${{ secrets.REVIO_API_KEY }}
          REVIO_BRAND_ID:             ${{ secrets.REVIO_BRAND_ID }}
          GOOGLE_SHEETS_CREDENTIALS:  ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          EMAIL_SENDER:               ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:             ${{ secrets.EMAIL_PASSWORD }}
          DRY_RUN:                    ${{ github.event.inputs.dry_run }}
        run: python scripts/dump_non_active_revio_subscribers.py
